<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>S. M. Kamal Hussain Shahi</title>
  <script>
    // GitHub Pages SPA redirect — preserves path for Flutter router.
    // pathSegmentsToKeep=0 because site is at root (shahi5472.github.io).
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host + '/?p=' +
      encodeURIComponent(l.pathname + l.search) +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
